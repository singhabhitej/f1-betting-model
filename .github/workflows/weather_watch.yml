name: Daily Weather Watch
on:
  schedule:
    - cron: '0 8 * * *'  # Daily 08:00 UTC
  workflow_dispatch:
jobs:
  weather_update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      # B3 FIX: Pass lat/lon from CALENDAR to fetch_weather()
      - run: python -c "from src.auto_ingest import get_next_race, fetch_weather; r = get_next_race(); fetch_weather(r['lat'], r['lon'])"
      - run: python -m src.auto_predict
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-update: daily weather refresh'
