name: Race Weekend Auto-Update
on:
  schedule:
    - cron: '0 */6 * * 4-0'  # Every 6h Thu-Sun
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m src.auto_ingest
      - run: python -m src.auto_predict
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-update: race weekend data refresh'
